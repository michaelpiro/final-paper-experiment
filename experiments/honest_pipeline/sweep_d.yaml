# =========================================================================
# Honest pipeline sweep — DSM vs AMF(full-D) vs LRao
# =========================================================================
# Sweeps (n_train, latent_dim, rho) and reports additive + replacement AUC.
#
# Methods:
#   AMF   — global_max, full 103-D, no training
#   DSM   — per_band_std, PCA-d, trained
#   LRao  — per_band_std, PCA-d, trained + early stopping
#
# Usage:
#   .venv/bin/python -u experiments/honest_pipeline/run_sweep.py

dataset: data/pavia-u.mat
results_dir: experiments/honest_pipeline/results

# ----- normalization -----
score_norm: per_band_std     # score models: per-band standardization (robust)
# AMF always uses global_max (set above in code)

# ----- operational split -----
target_cls: 1                 # asphalt (removed from background)
bkg_cls: 2                 # meadows
test_n: 4000

# ----- planted target -----
amplitude: 0.15
amp_list: [0.15]
target_fraction: 0.10

# ----- sweep axes -----
n_train_list: [ 400 ]
latent_dim_list: [ 3,5, 8, 12 ]

rho_list: [ 0.001 ]   # DSM noise level rho (sigma^2 = rho * tr(Sigma)/d)

# ----- score network -----
hidden_dims: [ 64, 64 ]
activation: silu
dsm_epochs: 2000
lrao_epochs: 100
lrao_patience: 3
lrao_val_frac: 0.2
lfi_delta_theta: 0.01
lfi_sigma_cutoff: 0.001
lr: 0.0005
weight_decay: 0.00005
batch_size: 256

# ----- reproducibility -----
seeds: [ 42, 43, 44, 45, 46 ]   # 5 independent seeds → mean ± std
