# =========================================================================
# Unified IID experiment — MULTI-CLASS, n-sweep (additive only)
# =========================================================================
# Background = all labeled non-target pixels (heterogeneous mixture) →
# NONLINEAR MLP [64,64] score net. GMM-Levin (+oracle) baselines ON.
# Same protocol as the single-class configs except: hidden_dims, bkg_cls,
# GMM on.

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results
run_name:    iid_multi_n

target_models: [ additive ]
device:        cpu           # tiny MLPs: CPU beats GPU (kernel-launch overhead)

score_norm:      per_band_std
target_cls:      1
bkg_cls:         null               # all labeled non-target classes
test_n:          2000
skip_pca:        false

amplitude:       0.15
amp_list:        [ 0.15 ]
target_fraction: 0.10

# ----- swept axis: n (fixed rho = 0.01) -----
n_train_list:    [ 50, 100, 200, 400, 750, 1000, 2000 ]
latent_dim_list: [ 20 ]
rho_list:        [ 0.01 ]

# ----- score network (NONLINEAR for multiclass mixture) -----
hidden_dims:      [ 64, 64 ]
activation:       silu
dsm_epochs:       1500
lrao_epochs:      50      # LRao overfits beyond ~50 ep (also 10x faster)
lfi_delta_theta:  0.001
lfi_sigma_cutoff: 0.00001
lr:               0.001
weight_decay:     0.0001
batch_size:       256

# ----- GMM-GLRT (Levin) + oracle reference: ON for multimodal clutter -----
run_gmm_glrt:     true
run_gmm_glrt_g:   true
gmm_max_dim:      5
gmm_k_max:        9
gmm_cond_tol:     1000
gmm_p_steps:      50
gmm_p_max:        1.0

seeds: [ 42, 43, 44, 45, 46 ]
