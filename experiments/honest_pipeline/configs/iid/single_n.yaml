# =========================================================================
# Unified IID experiment — SINGLE-CLASS, n-sweep (additive only)
# =========================================================================
# Background = class 2 (meadows), near-unimodal → LINEAR score net.
# Consistent protocol shared with the other 3 configs; the ONLY principled
# differences are: hidden_dims (linear here), bkg_cls, GMM off, swept axis.
#
#   .venv/bin/python -u experiments/honest_pipeline/run_sweep.py \
#       --config experiments/honest_pipeline/configs/iid/single_n.yaml

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results
run_name:    iid_single_n          # stable dir → resumable across restarts

# ----- target model: additive only -----
target_models: [ additive ]
device:        auto          # auto | cuda | cpu  (auto = GPU on Colab)

# ----- normalization / split -----
score_norm:      per_band_std
target_cls:      1                  # asphalt (removed from background)
bkg_cls:         2                  # meadows (single class)
test_n:          2000
skip_pca:        false

# ----- planted target -----
amplitude:       0.15
amp_list:        [ 0.15 ]
target_fraction: 0.10

# ----- swept axis: n (fixed rho = 0.01) -----
n_train_list:    [ 50, 100, 200, 400, 750, 1000, 2000 ]
latent_dim_list: [ 20 ]
rho_list:        [ 0.01 ]

# ----- score network (LINEAR for single-class) -----
hidden_dims:      [ ]
activation:       silu
dsm_epochs:       2000
lrao_epochs:      500
lfi_delta_theta:  0.001
lfi_sigma_cutoff: 0.00001
lr:               0.001
weight_decay:     0.0001
batch_size:       256

# ----- GMM-GLRT: OFF for single near-Gaussian class -----
run_gmm_glrt:     false
run_gmm_glrt_g:   false

# ----- reproducibility -----
seeds: [ 42, 43, 44, 45, 46 ]
