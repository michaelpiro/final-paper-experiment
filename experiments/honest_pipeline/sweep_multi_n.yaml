# =========================================================================
# Honest pipeline sweep — MULTICLASS background
# =========================================================================
# Same runner (run_sweep.py) as the single-class sweep.
# Background = all labeled non-target classes (heterogeneous).
# This tests the key advantage of score-based methods: non-Gaussian,
# multimodal background where AMF is misspecified.
#
# Usage:
#   .venv/bin/python -u experiments/honest_pipeline/run_sweep.py \
#       --config experiments/honest_pipeline/sweep_multi_n.yaml

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results

# ----- normalization -----
score_norm:  per_band_std

# ----- operational split -----
# bkg_cls: null  →  all labeled non-target pixels form the background
target_cls:  1        # asphalt (removed from background, 6631 px)
bkg_cls:     ~        # null = all other labeled classes (multi-class)
test_n:      4000

# ----- planted target -----
amplitude:       0.15
amp_list:        [0.15]
target_fraction: 0.10

# ----- sweep axes -----
n_train_list:    [50, 100, 200, 500, 1000, 2000]
latent_dim_list: [5]
rho_list:        [0.001]

# ----- score network -----
hidden_dims:     [64, 64]
activation:      silu
dsm_epochs:      3000
lrao_epochs: 500
lrao_patience: 3
lrao_val_frac: 0.2
lfi_delta_theta: 0.001
lfi_sigma_cutoff: 0.00001
lr: 0.0005
weight_decay:    0.00001
batch_size:      256

# ----- GMM-GLRT baselines (multiclass only) -----
# GMM-GLRT (Levin 2019): product of low-D GMMs over PCA eigen subsets, oracle θ
gmm_max_dim:  5
gmm_k_max:    9      # AIC selects up to this many components
gmm_cond_tol: 1000
# GMM-GLRT (Gauss, oracle): a single K-Gaussian mixture in full-D, oracle θ
gmm_g_K:      3

# ----- reproducibility -----
seeds: [42, 43, 44, 45, 46]
