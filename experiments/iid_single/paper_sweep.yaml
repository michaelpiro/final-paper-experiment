# =========================================================================
# Paper reproduction config — IID single-class (Section 4, main.pdf)
# =========================================================================
# Exact settings from the paper:
#   - Per-band [0,1] normalization
#   - Target signature: l2-normalized mean of target-class PCA projections
#   - rho = 5e-3 (optimal from ablation, Section 4.2)
#   - d = 5 (PCA dimension, optimal for single-class, Section 4.2)
#   - 8000 DSM epochs, 3000 LRao epochs with early stopping
#   - n_train in {50, 100, 200, 300, 500, 750, 1000, 2000}
#   - 5 independent seeds, report mean +/- std AUC

dataset:           data/pavia-u.mat
norm_mode:         per_band             # score models (DSM, LRao, AE) use per-band [0,1]
baseline_norm_mode: global_max          # classical baselines use global-max (honest, unwhitened)

# ----- classes -----
bkg_cls:           2                   # Meadows (18,649 px)
target_cls:        1                   # Asphalt (6,631 px)
exclude_classes:   []

# ----- target signature -----
# l2-normalized mean of target-class PCA projections (matches paper eq.)
normalize_signature: true

# ----- planted target (additive: y = w + theta*s) -----
amplitude:         0.15
target_fraction:   0.10                # 200 targets out of 2000 test pixels
test_size:         2000                # 1800 background + 200 targets

# ----- sweep axes -----
n_train_list:    [50, 100, 200, 300, 500, 750, 1000, 2000]
latent_dim_list: [5]                   # d=5 is optimal for single-class (paper Section 4.2)

# ----- seeds (5 independent repeats, as in the paper) -----
seeds: [42, 43, 44, 45, 46]

# ----- score network (2 hidden layers, width 64, SiLU — paper Section 4.1.0.2) -----
hidden_dims:       [64, 64]
activation:        silu

# ----- DSM training (8000 epochs — paper Section 4.1.0.3) -----
dsm_epochs:        8000
lr:                0.001
weight_decay:      0.0001
batch_size:        256

# ----- DSM noise level (rho=5e-3 is optimal — paper Section 4.2) -----
dsm_sigma_rho:     0.005               # sigma^2 = rho * (1/d) * tr(Sigma_hat)

# ----- LRao Mode-2 (3000 epochs + early stopping — paper Section 4.1.0.3) -----
lrao_epochs:       3000
lfi_delta_theta:   0.01
lfi_sigma_cutoff:  0.001
lfi_detach_sigma:  false
lrao_val_frac:     0.2                 # 20% held out for early stopping
lrao_patience:     3                   # patience=3 (paper Table I)

# ----- linear AE (kept for comparison, not in paper) -----
ae_epochs:         500
ae_lr:             0.001
ae_wd:             0.00001
ae_batch:          512
ae_bias:           false

# ----- GMM-family detectors -----
gmm_K:             3                   # K=3 for single-class (paper uses AMF/Reg-AMF/LRao)
gmm_theta_max:     0.5
gmm_theta_steps:   50

# ----- output -----
results_dir:       experiments/iid_single/results
