# =========================================================================
# IID single-class experiment configuration  (Pavia-U)
# =========================================================================
# ADDITIVE target only. EVERY detector consumes raw 103-D bands. Score methods
# (DSM, LRao Mode-2) carry a frozen ZCA whitening first layer (fit on the
# TRAINING background) and return data-space scores. NO PCA, NO autoencoder.
# Two sweeps: vs n (at fixed rho) and vs rho (at fixed n).
# Metrics: AUC, partial-AUC(Pfa<pauc_fpr), Pd@Pfa.

dataset: data/pavia-u.mat
norm_mode: none                # RAW sensor values — no scaling (no PCA anywhere)
whiten_mode: zca               # frozen whitening first layer: zca | pca | cholesky
whiten_eig_floor:      0      # DSM: 0 = spectral-gap adaptive floor (detects natural noise floor)
lrao_whiten_eig_floor: 0.0000000001               # LRao floor (× λ_max) — cut near-zero dirs to keep C_Ψ invertible

# ----- classes (single-class: ONE background class vs ONE target class) -----
bkg_cls: 2                     # asphalt
target_cls: 4                  # trees
exclude_classes: []

# ----- planted target (additive) -----
amplitude: 0.15
target_fraction: 0.10
test_size: 2000

# ----- sweep axes -----
# Full paper sweep — trim for quick tests by editing the lists below
n_train_list: [20,40, 60, 100, 200, 500, 1000, 2000]

rho_list: [
  0.00001, 0.001, 0.005,0.01,0.3,0.5,0.07, 0.1,0.5, 1.0,3.0,10.0
]
n_fixed_for_rho: 400           # n used for the vs-rho sweep

# ----- metric operating points -----
pfa: 0.1                       # Pd @ this Pfa
pauc_fpr: 0.1                  # partial AUC over Pfa < this

# ----- score network architecture (DSM + LRao share this) -----
hidden_dims: []         # primary DSM → linear score function
activation: silu
dsm_label: "LDSM"       # linear DSM label
hidden_dims_2: [128]    # secondary DSM → nonlinear MLP
activation_2: relu
dsm2_label: "DSM"       # nonlinear DSM label

# ----- training budgets -----
dsm_epochs: 2000
lrao_epochs: 2000

# ----- optimizer (DSM, LRao) -----
lr: 0.0005
weight_decay: 0.00005
batch_size: 512

# ----- DSM specifics -----
dsm_sigma_rho: 0.1      # current — fixed numeric ρ (KDE OFF)
#dsm_sigma_rho: 'auto'    # KDE: Parzen LOO log-likelihood
#dsm_sigma_rho: 'auto-sm' # KDE: Parzen LOO score-matching
#dsm_sigma_rho: 'lw'      # Ledoit-Wolf shrinkage (Gaussian, not KDE)

# ----- LRao Mode-2 specifics -----
lfi_delta_theta: 0.01
lfi_sigma_cutoff: 0.000001
lfi_detach_sigma: true       # detach Sigma → no incentive to collapse its variance (stable)
lrao_grad_clip: 1.0          # max grad-norm for LRao (0 = off)
# MLP LRao: a second LRao using the DSM-MLP architecture (here hidden_dims_2=[128]).
run_lrao_mlp: true
# LRao validation early stopping (it is the slow model). lrao_val_fraction>0 turns
# it on; training stops after lrao_patience checks with no val tr(J*) improvement.
lrao_val_fraction: 0.1
lrao_val_check_every: 50
lrao_patience: 6
lrao_min_delta: 0.005        # min RELATIVE val tr(J*) gain to count as improvement (else it never stops)

# ----- GMM-family detectors -----
gmm_K: 2

# ----- reproducibility -----
seed: [42, 43, 44, 45, 46]   # list of seeds for multiple runs (with different train/test splits)

# ----- output -----
results_dir: experiments/iid_single/results
