# =========================================================================
# IID single-class experiment configuration  (Pavia-U)
# =========================================================================
# ADDITIVE target only. EVERY detector consumes raw 103-D bands. Score methods
# (DSM, LRao Mode-2) carry a frozen ZCA whitening first layer (fit on the
# TRAINING background) and return data-space scores. NO PCA, NO autoencoder.
# Two sweeps: vs n (at fixed rho) and vs rho (at fixed n).
# Metrics: AUC, partial-AUC(Pfa<pauc_fpr), Pd@Pfa.

dataset: data/pavia-u.mat
norm_mode: none                # RAW sensor values — no scaling (no PCA anywhere)
whiten_mode: zca               # frozen whitening first layer: zca | pca | cholesky
whiten_eig_floor:      0.0000000000000001  # DSM floor  (× λ_max) — keep nearly all directions
lrao_whiten_eig_floor: 0.01               # LRao floor (× λ_max) — cut near-zero dirs to keep C_Ψ invertible

# ----- classes (single-class: ONE background class vs ONE target class) -----
bkg_cls: 2                     # asphalt
target_cls: 1                  # trees
exclude_classes: []

# ----- planted target (additive) -----
amplitude: 0.15
target_fraction: 0.10
test_size: 2000

# ----- sweep axes -----
# Full paper sweep — trim for quick tests by editing the lists below
n_train_list: [
    20,
    40, 60, 100, 200, 500, 1000, 2000
]

rho_list: [
  0.00001, 0.001, 0.007,0.01,0.07, 0.1,0.5, 1.0,3.0,10.0
]
n_fixed_for_rho: 1000           # n used for the vs-rho sweep

# ----- metric operating points -----
pfa: 0.1                       # Pd @ this Pfa
pauc_fpr: 0.1                  # partial AUC over Pfa < this

# ----- score network architecture (DSM + LRao share this) -----
hidden_dims: []
activation: silu

# ----- training budgets -----
dsm_epochs: 2000
lrao_epochs: 10

# ----- optimizer (DSM, LRao) -----
lr: 0.0005
weight_decay: 0.00005
batch_size: 256

# ----- DSM specifics -----
dsm_sigma_rho: 0.5            # fixed rho for the vs-n sweep; sigma=sqrt(rho) (whitened)

# ----- LRao Mode-2 specifics -----
lfi_delta_theta: 0.01
lfi_sigma_cutoff: 0.001
lfi_detach_sigma: false        # Sigma in graph (matches original LRao code)

# ----- GMM-family detectors -----
gmm_K: 2

# ----- reproducibility -----
seed: [42, 43, 44, 45, 46]   # list of seeds for multiple runs (with different train/test splits)

# ----- output -----
results_dir: experiments/iid_single/results
