# =========================================================================
# IID multiclass experiment configuration  (Pavia-U)
# =========================================================================
# Like iid_single.yaml but: ONE target class, background = union of all
# OTHER labeled classes (incl. class 0 / unlabeled unless excluded).
# Same pipeline + sweeps; only the data/GMM hyperparams differ.

dataset: data/pavia-u.mat
norm_mode: none                # RAW sensor values — no scaling (no PCA anywhere)
whiten_mode: zca               # frozen whitening first layer: zca | pca | cholesky
whiten_eig_floor:      0      # DSM: 0 = spectral-gap adaptive floor (detects natural noise floor)
lrao_whiten_eig_floor: 0.00001               # LRao floor (× λ_max) — cut near-zero dirs to keep C_Ψ invertible

# ----- target + background -----
target_cls: 6                  # detect this class (trees)
bkg_cls: null                  # ignored in multi — all other classes form background
exclude_classes: [2,0,9]           # leave [] to include class 0 (unlabeled) in background

# ----- planted target (additive) -----
amplitude: 0.15
target_fraction: 0.10
test_size: 2000

# ----- sweep axes -----
n_train_list: [
  20,
  40,
  60,
  100,
  200,
  500,
  1000,
  2000,

]   # vs-n  (at rho = dsm_sigma_rho)
rho_list: [
  0.00001, 0.001, 0.005,0.01,0.3,0.5,0.07, 0.1,0.5, 1.0,3.0,10.0
]
n_fixed_for_rho: 1000                                      # n used for the vs-rho sweep

# ----- metric operating points -----
pfa: 0.1                       # Pd @ this Pfa
pauc_fpr: 0.1                  # partial AUC over Pfa < this

# ----- score network architecture (DSM + LRao share this) -----
hidden_dims: [128]      # primary DSM → nonlinear MLP
activation: relu
dsm_label: "DSM"        # nonlinear DSM label (default, but explicit)
hidden_dims_2: []       # secondary DSM → linear score function
activation_2: relu
dsm2_label: "LDSM"     # linear DSM label

# ----- training budgets -----
dsm_epochs: 2000
lrao_epochs: 2000

# ----- optimizer (DSM, LRao) -----
lr: 0.0005
weight_decay: 0.0000005
batch_size: 512

# ----- DSM specifics -----
dsm_sigma_rho: 0.1            # fixed rho for the vs-n sweep; sigma=sqrt(rho) (whitened)


# ----- LRao Mode-2 specifics -----
lfi_delta_theta: 0.01
lfi_sigma_cutoff: 0.001
lfi_detach_sigma: false        # Sigma in graph (matches original LRao code)

# ----- GMM-family detectors (multiclass uses K=9 — bigger mixed background) -----
gmm_K: 9

# ----- reproducibility -----
seed: [42,43,44, 45, 46]   # list of seeds for multiple runs (with different train/test splits)

# ----- output -----
results_dir: experiments/iid_multi/results
