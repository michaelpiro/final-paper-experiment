# =========================================================================
# IID multiclass experiment configuration  (Pavia-U)
# =========================================================================
# Like iid_single.yaml but: ONE target class, background = union of all
# OTHER labeled classes (incl. class 0 / unlabeled unless excluded).
# Same pipeline + sweeps; only the data/GMM hyperparams differ.

dataset: data/pavia-u.mat
norm_mode: global_max           # global [0,1] normalization

# ----- target + background -----
target_cls: 3                # detect this class
bkg_cls: null             # ignored in multi
exclude_classes: [ ]               # leave [] to include class 0 in background

# ----- planted target -----
amplitude: 0.15
target_fraction: 0.10
test_size: 1000

# ----- sweep axes -----
n_train_list: [ 20, 40, 60, 100, 200, 500, 1000, 2000]
latent_dim_list: [ 5 ]

# ----- score network architecture (DSM + LRao share this) -----
hidden_dims: [ 64, 64 ]
activation: silu

# ----- training budgets -----
dsm_epochs: 2000
lrao_epochs: 100
ae_epochs: 150

# ----- optimizer -----
lr: 0.001
weight_decay: 0.00005
batch_size: 256

# ----- DSM specifics -----
dsm_sigma_rho: 0.01

# ----- LRao Mode-2 specifics -----
lfi_delta_theta: 0.01
lfi_sigma_cutoff: 0.001
lfi_detach_sigma: false
lrao_val_frac: 0.2
lrao_patience: 3

# ----- linear AE training -----
ae_lr: 0.001
ae_wd: 0.00001
ae_batch: 512
ae_bias: false

# ----- GMM-family detectors (multiclass uses K=9, bigger search range) -----
gmm_K: 9
gmm_theta_max: 0.5
gmm_theta_steps: 50

# ----- reproducibility -----
seed: 42

# ----- output -----
results_dir: experiments/iid_multi/results
