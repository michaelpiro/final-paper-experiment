# =========================================================================
# Spatial Neighbor-Adapted Score experiment  (Pavia-U)
# =========================================================================
# Rectangles are [row0, row1, col0, col1] (end-exclusive).
# Both boxes must exclude the target class — verified at runtime.

dataset:    data/pavia-u.mat
norm_mode:  global_max

target_cls:  0                  # class whose mean defines the target signature
train_box:   [380, 470, 0, 200] # background-only training region
test_box:    [480, 570, 0, 200] # background-only test region (targets planted here)

amplitude:        0.15          # planted target fill-factor (θ)
target_fraction:  0.10          # fraction of test pixels with a target
seed:             42

train_n:  4000                  # max training pixels (subsampled for speed)
test_n:   4000                  # max test pixels

# ----- Dimensionality reduction -----
latent_dim: 5                   # PCA dims; all detectors run in this space

# ----- Neighbor-Adapted Score (NAS) -----
k:              11              # k×k spatial window  (K = k²-1 neighbors)
M:              1024            # encoder output dim
nas_hidden:     [64, 64]
nas_lambda:     0.5             # ridge init (trainable if nas_learn_lambda: true)
nas_learn_lambda: true
nas_epochs:     300
nas_batch:      64
nas_mc:         8               # Monte-Carlo draws at inference

# ----- Global DSM baseline -----
dsm_hidden:   [64, 64]
activation:   silu
dsm_epochs:   3000
lr:           0.0005
weight_decay: 0.0001
batch_size:   256
dsm_sigma_rho: 0.01             # σ² = ρ·(1/d)·tr(Σ̂)

# ----- LRao Mode-2 (optional, slow) -----
run_lrao:    false
lrao_epochs: 100
lfi_delta:   0.01
lfi_cutoff:  0.001

# ----- Classical baselines -----
gmm_K:          9
gmm_theta_max:  1.0
gmm_theta_steps: 50

# ----- Output -----
results_dir: experiments/spatial/results
