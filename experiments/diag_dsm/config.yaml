# =========================================================================
# Isotropic vs Diagonal DSM-noise comparison  (Pavia-U, single-class)
# =========================================================================
# Two DSM models, identical in every way EXCEPT the training-noise covariance:
#   DSM-iso  : Σ_n = σ²I,         σ²  = ρ·(1/d)·tr(Σ̂)      (current DSM)
#   DSM-diag : Σ_n = diag(σ_b²),  σ_b = sqrt(ρ·Var_b)       (data-driven diagonal)
# Both run in the same PCA-d latent space on the same global_max-normalized
# data, with identical architecture / lr / epochs / weight init.

dataset:           data/pavia-u.mat
norm_mode:         global_max       # honest, baseline-neutral uniform scaling

# ----- classes (single-class: ONE background class vs ONE target class) -----
bkg_cls:           2                # asphalt
target_cls:        1                # trees

# ----- planted target (additive amp·s on a fraction of the test set) -----
amplitude:         0.15
target_fraction:   0.10
test_size:         2000

# ----- sweep axes -----
n_train_list:      [50,200,500,1000, 2000]
latent_dim_list:   [5]

# ----- score network architecture (shared by both models) -----
hidden_dims:       [64, 64]
activation:        silu

# ----- training budget -----
dsm_epochs:        3000
lr:                0.001
weight_decay:      0.0001
batch_size:        512

# ----- DSM noise level -----
dsm_sigma_rho:     0.1             # σ_b² = ρ · Var_b   (and pooled for iso)

# ----- reproducibility -----
seed:              42

# ----- output -----
results_dir:       experiments/diag_dsm/results
