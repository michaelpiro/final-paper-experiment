# EASY case — low-dimensional synthetic GMM (fast). Two providers selectable:
#   provider: iid_gmm     (non-spatial; spatial detectors auto-skipped)
#   provider: spatial_gmm (smooth GMM label field; spatial detectors run)
provider: spatial_gmm

provider_cfg:
  seed: 0
  dim: 6                 # LOW dimension -> fast
  K: 4                   # GMM components
  separation: 2.5        # component mean spread
  spatial_smooth: 3.0    # spatial coherence of the component-label field
  train_shape: [60, 60]
  test_shape:  [60, 60]
  k: 5                   # KxK spatial neighbourhood
  n_train: 4000          # (iid_gmm only)
  n_test:  4000          # (iid_gmm only)
  dsm_sigma_rho: 0.01

# Every detector; needs_spatial ones auto-skip on iid_gmm
detectors: [AMF, Reg-AMF, CEM, GMM-Levin, Self-GMM, Spatial-GMM,
            DSM, NeighborMLP, CF-Attn, CF-Attn-CFAR, MCLT]

detector_cfg:
  Self-GMM:    {K: 4}
  Spatial-GMM: {K: 4}

# Sweep both target models incl. FULL replacement (theta=1) as a "did it train" check,
# across several signatures and amplitudes.
target_models: [additive, replacement]
signatures: all                       # comp_mean (entangled) / between / orthogonal
amplitudes: [0.05, 0.1, 0.2, 0.5, 1.0]
target_fraction: 0.10
seed: 42

# tiny overrides for --dry-run
dry_run_amplitudes: [0.2, 1.0]
dry_run_provider_cfg: {train_shape: [24, 24], test_shape: [24, 24], n_train: 600, n_test: 600}
dry_run_detector_cfg: {cfattn_epochs: 8, nmlp_epochs: 8, dsm_epochs: 20, mclt_epochs: 3}
