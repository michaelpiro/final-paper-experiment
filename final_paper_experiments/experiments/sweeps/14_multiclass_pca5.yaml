# PRIORITY 14 — Multiclass: all 9 classes, reduced settings for speed
dataset:          real_datasets/pavia-u.mat
normalization:    global
pca_dim:          5
hidden_dims:      [64, 64]
activation:       silu
dsm_epochs:       4000
lrao_epochs:      2000
checkpoint_every: 100
lr:               0.0005
weight_decay:     0.0001
batch_size:       256
run_lrao:         true
lfi_delta_theta:  0.01
gmm_K:            1
gmm_theta_max:    2.0
gmm_theta_steps:  50
target_models:    [additive, replacement]
n_train_list:     [500, 2000, 4000]
test_size:        1000
amplitude:        0.15
target_fraction:  0.1
target_classes:   all
exclude_classes:  [0]
dsm_sigma:        auto
dsm_sigma_rho:    0.01
num_seeds:        1
base_seed:        42
run_lrao_mlp:     false
results_dir:      final_paper_experiments/results
