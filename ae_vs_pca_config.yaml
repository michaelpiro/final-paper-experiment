latent_dim: 5              # bottleneck dimension for AE and PCA
ae_hidden_dims: [8, 8]   # hidden layer sizes in autoencoder encoder/decoder
ae_epochs: 1             # epochs to train deep autoencoders (AE-clean, AE-mixed)
linear_ae_epochs: 1      # epochs to train linear/relu autoencoders
dsm_epochs: 1           # epochs to train each DSM model
dsm_sigma: 0.008            # DSM noise level σ
dsm_hidden_dims: [64, 64]  # DSM ScoreNet hidden layers
n_train: 2400              # background samples for training
n_test: 600                # background samples for test (before planting)
amplitude: 0.15            # target planting amplitude θ
target_fraction: 0.10      # fraction of train/test rows contaminated with target
lr: 0.0005
weight_decay: 0.0001
batch_size: 256
results_dir: experiments/ae_vs_pca_example
