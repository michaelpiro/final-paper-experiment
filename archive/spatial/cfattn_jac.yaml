# =========================================================================
# CF-Attn Jacobian pullback experiment
# =========================================================================
# Compares CF-Attn-Jac (feature-space extension) against:
#   CF-Attn-base, NeighborMLP, DSM, AMF, Reg-AMF, GMM-GLRT
# All trained on identical data — same boxes and target as cfattn.yaml.
#
# Usage:
#   .venv/bin/python experiments/spatial/pick_boxes.py --config experiments/spatial/cfattn_jac.yaml
#   .venv/bin/python -u experiments/spatial/run_cfattn_jac.py

dataset:     data/pavia-u.mat
norm_mode:   global_max
results_dir: experiments/spatial/results

# ----- spatial rectangles (same as cfattn.yaml + neighbor_mlp.yaml) -----
train_box:   [323, 426, 11, 167]
test_box:    [443, 529, 87, 291]

# ----- target (dominant-class offset) -----
sig_dom_weight:  0.9
sig_mean_weight: 0.1

# ----- planted target -----
amplitude:        0.15
target_fraction:  0.10
train_n:          4000
test_n:           4000

# ----- dimensionality reduction -----
latent_dim: 5

# ----- spatial neighborhood -----
k: 5                         # window size: M = k*k-1 = 24 neighbors

# ----- CF-Attn-Jac (new model) -----
jac_feature_dim: 10          # feature space dim p (2*D default; try 10, 15, 20)
jac_epochs:      400
jac_lr:          3.0e-4
jac_batch:       128          # smaller batch — autograd through VJP needs memory

# ----- CF-Attn-base (comparison) -----
cfattn_h:       64
cfattn_K:       9
cfattn_eps:     1.0e-4
cfattn_epochs:  400
cfattn_lr:      3.0e-4
lam_ent:        0.05
lam_div:        0.05
lam_cov:        1.0e-5

# ----- NeighborMLP (comparison) -----
nmlp_d_lat:    32
nmlp_K:        8
nmlp_hidden:   128
nmlp_n_layers: 3
nmlp_epochs:   300
nmlp_lr:       3.0e-4
nmlp_batch:    256

# ----- DSM (global baseline) -----
dsm_hidden:    [64, 64]
dsm_epochs:    1000
dsm_lr:        5.0e-4

# ----- shared -----
activation:    silu
dsm_sigma_rho: 0.01
batch_size:    256
weight_decay:  1.0e-4

# ----- GMM baselines -----
gmm_K:           9
gmm_theta_max:   0.5
gmm_theta_steps: 50

# ----- reproducibility -----
seed: 42
