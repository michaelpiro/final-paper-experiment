# =========================================================================
# Honest pipeline sweep — AUC vs n, single-class, ELM normalization
# =========================================================================
# ELM proxy: dark = 1st percentile of background per band,
#            bright = 99th percentile of background per band.
# This is an invertible affine map — Proposition 1 guarantees the optimal
# detector is invariant to it.  Included to verify empirically.

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results

# ----- normalization -----
score_norm:  elm                 # ELM proxy: 1st/99th percentile per band

# ----- operational split -----
target_cls:  1                   # asphalt (removed from background)
bkg_cls:     2                   # meadows
test_n:      4000

# ----- planted target -----
amplitude:       0.15
amp_list:        [0.15]
target_fraction: 0.10

# ----- sweep axes -----
n_train_list:    [50, 100, 200, 500, 750, 1000, 2000]
latent_dim_list: [5]
rho_list:        [0.001]

# ----- score network -----
hidden_dims:     [64, 64]
activation:      silu
dsm_epochs:      3000
lrao_epochs:     3000
lrao_patience:   3
lrao_val_frac:   0.2
lfi_delta_theta: 0.001
lfi_sigma_cutoff: 0.00001
lr:              0.0005
weight_decay:    0.00005
batch_size:      256

# ----- reproducibility -----
seeds: [42, 43, 44, 45, 46]
