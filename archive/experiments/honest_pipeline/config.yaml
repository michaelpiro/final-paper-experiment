# =========================================================================
# Honest score-based detection pipeline experiment
# =========================================================================
# Demonstrates the derived validity conditions:
#   - Fixed invertible normalization calibrated on background only
#   - Consistent signature transform (direction / point rule)
#   - rho_d validity diagnostic for the PCA step
#
# Usage:
#   .venv/bin/python -u experiments/honest_pipeline/run.py

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results

# ----- normalization (Step 0): per_band_std | global_max | per_band_minmax -----
norm: per_band_std            # recommended: robust, band-symmetric, invertible

# ----- operational split -----
# Hard case: target (trees) is spectrally similar to background (meadows) —
# both vegetation — so detectability depends on retaining the right subspace.
target_cls:  4                # trees (REMOVED from background)
bkg_cls:     2                # background = meadows
train_n:     4000
test_n:      4000

# ----- planted target (weak signal so PCA truncation visibly costs AUC) -----
amplitude:       0.15
target_fraction: 0.10

# ----- PCA dimension sweep (shows rho_d -> 1 and AUC -> ceiling) -----
latent_dim_list: [3, 5, 8, 12]

# ----- score network -----
hidden_dims: [64, 64]
activation:  silu
dsm_epochs:  3000
lr:          0.001
weight_decay: 0.0001
batch_size:  256
dsm_sigma_rho: 0.01

# ----- reproducibility -----
seed: 42
