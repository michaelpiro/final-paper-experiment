# =========================================================================
# Honest pipeline sweep — AUC vs n, multi-class, per-band min-max norm
# =========================================================================
# Identical to sweep_multi_n.yaml except score_norm: per_band_minmax.
# Background = all non-target labeled classes.  AMF uses global_max.

dataset:     data/pavia-u.mat
results_dir: experiments/honest_pipeline/results

# ----- normalization -----
score_norm:  per_band_minmax     # per-band [0,1] for score models

# ----- operational split -----
target_cls:  1                   # asphalt (removed from background)
bkg_cls:     ~                   # null = all other labeled classes (multi-class)
test_n:      4000

# ----- planted target -----
amplitude:       0.15
amp_list:        [0.15]
target_fraction: 0.10

# ----- sweep axes -----
n_train_list:    [50, 100, 200, 500, 1000, 2000]
latent_dim_list: [5]
rho_list:        [0.001]

# ----- score network -----
hidden_dims:     [64, 64]
activation:      silu
dsm_epochs:      3000
lrao_epochs:     3000
lrao_patience:   3
lrao_val_frac:   0.2
lfi_delta_theta: 0.001
lfi_sigma_cutoff: 0.00001
lr:              0.0005
weight_decay:    0.00001
batch_size:      256

# ----- GMM-GLRT baselines (multiclass only) -----
gmm_max_dim:  5
gmm_k_max:    9
gmm_cond_tol: 1000
gmm_g_K:      3

# ----- reproducibility -----
seeds: [42, 43, 44, 45, 46]
